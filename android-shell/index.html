<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <title>GamePrice</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: linear-gradient(160deg, #0a0a0f 0%, #12121a 100%);
        color: #fff;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      .wrap { text-align: center; padding: 2rem; }
      .logo {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        margin: 0 auto 1rem;
        box-shadow: 0 8px 32px rgba(99, 102, 241, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; font-weight: 700; }
      p { color: #8f98a0; font-size: 0.875rem; margin: 0; }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(99, 102, 241, 0.25);
        border-top-color: #6366f1;
        border-radius: 50%;
        margin: 1.25rem auto 0;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img src="logo.png" alt="GamePrice" class="logo" width="80" height="80" />
      <h1>GamePrice</h1>
      <p>Oyun fiyatları yükleniyor…</p>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </body>
</html>
