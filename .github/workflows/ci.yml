name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "file:./prisma/ci.db"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run db:push

      - run: npm run lint

      - run: npm run test

      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build

    env:
      DATABASE_URL: "file:./prisma/ci.db"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run db:push

      - run: npx playwright install chromium --with-deps

      - run: npm run build

      - run: npm run start &
        env:
          PORT: 3000

      - run: npx wait-on http://localhost:3000 -t 60000

      - run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
