name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "file:./prisma/ci.db"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prepare Android SDK
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Sync Capacitor
        run: npm run cap:sync

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../gradle-build.log

      - name: Prepare APK artifact
        run: cp android/app/build/outputs/apk/debug/app-debug.apk gameprice.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gameprice-apk
          path: gameprice.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log

      - name: Publish apk-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: GamePrice Android APK
          body: "Son derlenen debug APK. Indir: https://gameprice.org/download"
          files: gameprice.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish versioned release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: gameprice.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
