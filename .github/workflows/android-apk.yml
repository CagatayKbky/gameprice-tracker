name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "android/**"
      - "android-shell/**"
      - "capacitor.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android
        run: npm run cap:sync

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Prepare APK artifact
        run: cp android/app/build/outputs/apk/debug/app-debug.apk gameprice.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gameprice-apk
          path: gameprice.apk
          retention-days: 90

      - name: Publish apk-latest release
        run: |
          gh release upload "apk-latest" gameprice.apk --clobber 2>/dev/null || \
          gh release create "apk-latest" gameprice.apk \
            --title "GamePrice Android APK" \
            --notes "Son derlenen debug APK. Play Store dışı kurulum için indir: https://gameprice.org/download"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish versioned release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: gameprice.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
