name: Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android
        run: npm run cap:sync

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gameprice-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename and attach to latest release on main
        if: github.event_name == 'workflow_dispatch'
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk gameprice.apk
          gh release upload "apk-latest" gameprice.apk --clobber 2>/dev/null || \
          gh release create "apk-latest" gameprice.apk \
            --title "GamePrice Android APK" \
            --notes "Son derlenen debug APK. Play Store dışı kurulum için indir."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
